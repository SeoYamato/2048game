<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>2048ゲーム</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --panel: #ffffff;
      --board: #bbada0;
      --cell-empty: rgba(238, 228, 218, 0.35);
      --text-main: #4b4038;
      --text-light: #f9f6f2;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      --radius: 14px;
      --tile-size: clamp(56px, 18vw, 86px);
      --gap: clamp(8px, 2vw, 12px);
      --board-size: calc(var(--tile-size) * 4 + var(--gap) * 5);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      color: var(--text-main);
      background: linear-gradient(165deg, #faf7f2 0%, #f3eee7 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(100%, 480px);
      background: var(--panel);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #7f6755;
    }

    .score-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .score-box {
      min-width: 100px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #eee4da;
      text-align: center;
    }

    .score-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #7f6755;
      margin-bottom: 2px;
    }

    .score-value {
      font-weight: 800;
      font-size: 1.2rem;
      color: #5a4f46;
    }

    .new-game-btn {
      border: none;
      background: #8f7a66;
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .new-game-btn:hover {
      filter: brightness(1.05);
    }

    .new-game-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .hint {
      margin: 4px 0 14px;
      font-size: 0.92rem;
      color: #7a6a5f;
      line-height: 1.5;
    }

    .board-wrap {
      position: relative;
      width: var(--board-size);
      max-width: 100%;
      margin-inline: auto;
    }

    .board {
      position: relative;
      width: var(--board-size);
      height: var(--board-size);
      max-width: 100%;
      max-height: min(var(--board-size), 90vw);
      background: var(--board);
      border-radius: var(--radius);
      padding: var(--gap);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
      touch-action: none;
      user-select: none;
    }

    .cell {
      border-radius: 10px;
      background: var(--cell-empty);
    }

    .tiles {
      position: absolute;
      inset: var(--gap);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
      pointer-events: none;
    }

    .tile {
      display: grid;
      place-items: center;
      border-radius: 10px;
      font-weight: 800;
      font-size: clamp(1rem, 4vw, 1.8rem);
      color: #776e65;
      animation: pop 0.14s ease;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
    }

    @keyframes pop {
      0% { transform: scale(0.86); }
      100% { transform: scale(1); }
    }

    .v2 { background: #eee4da; color: #776e65; }
    .v4 { background: #ede0c8; color: #776e65; }
    .v8 { background: #f2b179; color: var(--text-light); }
    .v16 { background: #f59563; color: var(--text-light); }
    .v32 { background: #f67c5f; color: var(--text-light); }
    .v64 { background: #f65e3b; color: var(--text-light); }
    .v128 { background: #edcf72; color: var(--text-light); font-size: clamp(0.95rem, 3.4vw, 1.5rem); }
    .v256 { background: #edcc61; color: var(--text-light); font-size: clamp(0.95rem, 3.4vw, 1.5rem); }
    .v512 { background: #edc850; color: var(--text-light); font-size: clamp(0.95rem, 3.4vw, 1.45rem); }
    .v1024 { background: #edc53f; color: var(--text-light); font-size: clamp(0.82rem, 3vw, 1.25rem); }
    .v2048 { background: #edc22e; color: var(--text-light); font-size: clamp(0.82rem, 3vw, 1.2rem); }
    .vbig { background: #3c3a32; color: var(--text-light); font-size: clamp(0.8rem, 3vw, 1.1rem); }

    .overlay {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: rgba(238, 228, 218, 0.78);
      display: none;
      place-items: center;
      text-align: center;
      padding: 16px;
    }

    .overlay.show {
      display: grid;
    }

    .overlay-message {
      color: #6f5f52;
      font-weight: 800;
      font-size: clamp(1.25rem, 5vw, 1.9rem);
      margin-bottom: 12px;
    }

    .overlay-sub {
      color: #78695d;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    @media (max-width: 380px) {
      .app { padding: 14px; }
      .score-box { min-width: 86px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">2048</h1>
      <div class="score-wrap">
        <div class="score-box">
          <span class="score-label">スコア</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">最高</span>
          <span class="score-value" id="best">0</span>
        </div>
        <button class="new-game-btn" id="newGameBtn" type="button">New Game</button>
      </div>
    </header>

    <p class="hint">PCは矢印キー、スマホはスワイプでタイルを動かせます。</p>

    <section class="board-wrap">
      <div class="board" id="board" aria-label="2048ゲーム盤面"></div>
      <div class="tiles" id="tiles"></div>
      <div class="overlay" id="overlay">
        <div>
          <div class="overlay-message">ゲームオーバー</div>
          <div class="overlay-sub">もう動かせる場所がありません。</div>
          <button class="new-game-btn" id="overlayNewGame" type="button">もう一度遊ぶ</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    "use strict";

    const SIZE = 4;
    const BEST_KEY = "2048_best_score";
    let grid = createEmptyGrid();
    let score = 0;
    let bestScore = loadBestScore();
    let gameOver = false;

    const boardEl = document.getElementById("board");
    const tilesEl = document.getElementById("tiles");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlayEl = document.getElementById("overlay");
    const newGameBtn = document.getElementById("newGameBtn");
    const overlayNewGameBtn = document.getElementById("overlayNewGame");

    function createEmptyGrid() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    function initBoardBackground() {
      for (let i = 0; i < SIZE * SIZE; i += 1) {
        const cell = document.createElement("div");
        cell.className = "cell";
        boardEl.appendChild(cell);
      }
    }

    function loadBestScore() {
      try {
        const raw = localStorage.getItem(BEST_KEY);
        if (raw === null) return 0;
        const n = parseInt(raw, 10);
        return Number.isFinite(n) && n >= 0 ? n : 0;
      } catch {
        return 0;
      }
    }

    function saveBestScore() {
      try {
        localStorage.setItem(BEST_KEY, String(bestScore));
      } catch {
        /* ignore quota / private mode */
      }
    }

    function startNewGame() {
      grid = createEmptyGrid();
      score = 0;
      gameOver = false;
      updateScore();
      hideOverlay();
      addRandomTile();
      addRandomTile();
      render();
    }

    function updateScore() {
      scoreEl.textContent = String(score);
      bestEl.textContent = String(bestScore);
    }

    function maybeUpdateBestScore() {
      if (score > bestScore) {
        bestScore = score;
        saveBestScore();
      }
      updateScore();
    }

    function getEmptyCells() {
      const empty = [];
      for (let r = 0; r < SIZE; r += 1) {
        for (let c = 0; c < SIZE; c += 1) {
          if (grid[r][c] === 0) {
            empty.push({ r, c });
          }
        }
      }
      return empty;
    }

    function addRandomTile() {
      const empty = getEmptyCells();
      if (empty.length === 0) return;
      const { r, c } = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function render() {
      tilesEl.innerHTML = "";
      for (let r = 0; r < SIZE; r += 1) {
        for (let c = 0; c < SIZE; c += 1) {
          const value = grid[r][c];
          if (value === 0) continue;
          const tile = document.createElement("div");
          tile.className = `tile ${value <= 2048 ? "v" + value : "vbig"}`;
          tile.style.gridRowStart = String(r + 1);
          tile.style.gridColumnStart = String(c + 1);
          tile.textContent = String(value);
          tilesEl.appendChild(tile);
        }
      }
    }

    function slideAndMergeLine(line) {
      const compact = line.filter((v) => v !== 0);
      const merged = [];
      let gained = 0;

      for (let i = 0; i < compact.length; i += 1) {
        if (compact[i] !== 0 && compact[i] === compact[i + 1]) {
          const value = compact[i] * 2;
          merged.push(value);
          gained += value;
          i += 1;
        } else {
          merged.push(compact[i]);
        }
      }

      while (merged.length < SIZE) {
        merged.push(0);
      }

      return { line: merged, gained };
    }

    function reverse(arr) {
      return [...arr].reverse();
    }

    function move(direction) {
      if (gameOver) return;
      let moved = false;
      let gainedTotal = 0;

      const nextGrid = createEmptyGrid();

      if (direction === "left" || direction === "right") {
        for (let r = 0; r < SIZE; r += 1) {
          const current = grid[r];
          const source = direction === "right" ? reverse(current) : [...current];
          const { line, gained } = slideAndMergeLine(source);
          const finalLine = direction === "right" ? reverse(line) : line;

          for (let c = 0; c < SIZE; c += 1) {
            nextGrid[r][c] = finalLine[c];
            if (nextGrid[r][c] !== grid[r][c]) moved = true;
          }
          gainedTotal += gained;
        }
      } else {
        for (let c = 0; c < SIZE; c += 1) {
          const currentCol = [];
          for (let r = 0; r < SIZE; r += 1) currentCol.push(grid[r][c]);

          const source = direction === "down" ? reverse(currentCol) : currentCol;
          const { line, gained } = slideAndMergeLine(source);
          const finalCol = direction === "down" ? reverse(line) : line;

          for (let r = 0; r < SIZE; r += 1) {
            nextGrid[r][c] = finalCol[r];
            if (nextGrid[r][c] !== grid[r][c]) moved = true;
          }
          gainedTotal += gained;
        }
      }

      if (!moved) return;

      grid = nextGrid;
      score += gainedTotal;
      maybeUpdateBestScore();
      addRandomTile();
      render();

      if (!canMove()) {
        gameOver = true;
        showOverlay();
      }
    }

    function canMove() {
      if (getEmptyCells().length > 0) return true;

      for (let r = 0; r < SIZE; r += 1) {
        for (let c = 0; c < SIZE; c += 1) {
          const v = grid[r][c];
          if (r + 1 < SIZE && grid[r + 1][c] === v) return true;
          if (c + 1 < SIZE && grid[r][c + 1] === v) return true;
        }
      }
      return false;
    }

    function showOverlay() {
      overlayEl.classList.add("show");
    }

    function hideOverlay() {
      overlayEl.classList.remove("show");
    }

    function handleKeydown(e) {
      const keyToDir = {
        ArrowLeft: "left",
        ArrowRight: "right",
        ArrowUp: "up",
        ArrowDown: "down"
      };
      const direction = keyToDir[e.key];
      if (!direction) return;
      e.preventDefault();
      move(direction);
    }

    function setupSwipe() {
      let startX = 0;
      let startY = 0;
      let tracking = false;
      const threshold = 28;

      const onTouchStart = (e) => {
        if (e.touches.length !== 1) return;
        const t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        tracking = true;
      };

      const onTouchEnd = (e) => {
        if (!tracking) return;
        tracking = false;
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        const adx = Math.abs(dx);
        const ady = Math.abs(dy);

        if (Math.max(adx, ady) < threshold) return;
        if (adx > ady) {
          move(dx > 0 ? "right" : "left");
        } else {
          move(dy > 0 ? "down" : "up");
        }
      };

      boardEl.addEventListener("touchstart", onTouchStart, { passive: true });
      boardEl.addEventListener("touchend", onTouchEnd, { passive: true });
    }

    document.addEventListener("keydown", handleKeydown);
    newGameBtn.addEventListener("click", startNewGame);
    overlayNewGameBtn.addEventListener("click", startNewGame);

    initBoardBackground();
    setupSwipe();
    startNewGame();
  </script>
</body>
</html>
